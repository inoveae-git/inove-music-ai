<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Inove Music AI V3.1</title>
<style>
body{background:#111;color:#d4af37;font-family:Arial;max-width:520px;margin:auto;padding:20px}
input,select,button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px}
button{background:#d4af37;color:#111;font-weight:bold}
#msg{margin:10px 0;color:#fff}
</style></head>
<body>
<h1>🎵 Inove Music AI V3.1</h1>
<input id='tema' placeholder='Tema da música'>
<select id='estilo'><option>pop</option><option>funk</option><option>trap</option><option>melody</option></select>
<button onclick='go()'>PRODUZIR SOM</button>
<div id='msg'></div>
<audio id='player' controls style='width:100%;display:none'></audio>
<script>
async function go(){
 msg.textContent='Gerando áudio... aguarde';
 player.style.display='none';
 const r=await fetch('/api/generate',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({tema:tema.value,estilo:estilo.value})
 });
 if(!r.ok){
   try{
     const j=await r.json();
     msg.textContent=j.message;
   }catch(e){
     msg.textContent='Erro ao gerar';
   }
   return;
 }
 const blob=await r.blob();
 player.src=URL.createObjectURL(blob);
 player.style.display='block';
 msg.textContent='Pronto!';
}
</script>
</body></html>
